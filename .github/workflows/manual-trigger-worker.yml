name: Manual Trigger BioAI Worker

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "daily, opportunity-batch, opportunity, or project-opportunity"
        required: true
        default: "opportunity-batch"
        type: string
      target_date:
        description: "Date in YYYY-MM-DD, defaults to Asia/Shanghai today"
        required: false
        type: string
      async:
        description: "Use async=1 for a quick 202 response"
        required: false
        default: "false"
        type: string

jobs:
  trigger:
    runs-on: ubuntu-latest
    env:
      DEFAULT_WORKER_BASE_URL: https://cloudflare-bioai-daily.sabrinamisan090.workers.dev
      DEFAULT_TRIGGER_SECRET: test-secret-key-change-me
    steps:
      - name: Trigger worker endpoint
        shell: bash
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_TARGET_DATE: ${{ github.event.inputs.target_date }}
          INPUT_ASYNC: ${{ github.event.inputs.async }}
          WORKER_BASE_URL: ${{ vars.WORKER_BASE_URL }}
          TRIGGER_SECRET: ${{ secrets.TEST_TRIGGER_SECRET }}
        run: |
          set -euo pipefail

          TARGET_DATE="${INPUT_TARGET_DATE:-}"
          if [[ -z "$TARGET_DATE" ]]; then
            TARGET_DATE="$(TZ=Asia/Shanghai date +%F)"
          fi
          if [[ ! "$TARGET_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid target date: $TARGET_DATE"
            exit 1
          fi

          WORKER_BASE_URL="${WORKER_BASE_URL:-$DEFAULT_WORKER_BASE_URL}"
          TRIGGER_SECRET="${TRIGGER_SECRET:-$DEFAULT_TRIGGER_SECRET}"
          MODE="${INPUT_MODE:-opportunity-batch}"
          ASYNC_FLAG="${INPUT_ASYNC:-false}"

          case "$MODE" in
            daily)
              PATH_PART="testTriggerScheduled"
              ;;
            opportunity|opportunity-batch)
              PATH_PART="testTriggerScheduledOpportunity"
              ;;
            project-opportunity)
              PATH_PART="testTriggerScheduledProjectOpportunity"
              ;;
            *)
              echo "Unsupported mode: $MODE"
              exit 1
              ;;
          esac

          URL="${WORKER_BASE_URL%/}/${PATH_PART}?key=${TRIGGER_SECRET}&date=${TARGET_DATE}&sync=1"
          if [[ "$ASYNC_FLAG" == "true" || "$ASYNC_FLAG" == "1" ]]; then
            URL="${WORKER_BASE_URL%/}/${PATH_PART}?key=${TRIGGER_SECRET}&date=${TARGET_DATE}&async=1"
          fi

          echo "Mode: $MODE"
          echo "Date: $TARGET_DATE"
          echo "Endpoint: ${WORKER_BASE_URL%/}/${PATH_PART}"

          body_file="$(mktemp)"
          status="$(curl -sS --max-time 900 -o "$body_file" -w "%{http_code}" "$URL" || true)"
          response="$(cat "$body_file" 2>/dev/null || true)"
          rm -f "$body_file"

          echo "HTTP status: ${status:-000}"
          echo "Response:"
          echo "$response"

          if [[ "${status:-000}" -lt 200 || "${status:-000}" -ge 300 ]]; then
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Manual BioAI Worker Trigger"
            echo ""
            echo "- Mode: ${{ github.event.inputs.mode }}"
            echo "- Date: ${{ github.event.inputs.target_date }}"
            echo "- Async: ${{ github.event.inputs.async }}"
          } >> "$GITHUB_STEP_SUMMARY"