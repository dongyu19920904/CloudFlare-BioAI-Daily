name: Project Opportunity Evening Schedule

on:
  schedule:
    - cron: "50 11 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional date in YYYY-MM-DD (default: Asia/Shanghai today)"
        required: false
        type: string

jobs:
  run-project-opportunity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FRONTEND_OWNER: dongyu19920904
      FRONTEND_REPO: BioAI-Daily-Web
      DEFAULT_WORKER_BASE_URL: https://cloudflare-bioai-daily.sabrinamisan090.workers.dev
      DEFAULT_TRIGGER_SECRET: test-secret-key-change-me

    steps:
      - name: Trigger project opportunity generation
        id: trigger
        shell: bash
        env:
          INPUT_TARGET_DATE: ${{ github.event.inputs.target_date }}
          WORKER_BASE_URL: ${{ vars.WORKER_BASE_URL }}
          TRIGGER_SECRET: ${{ secrets.TEST_TRIGGER_SECRET }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_TARGET_DATE:-}" ]]; then
            TARGET_DATE="${INPUT_TARGET_DATE}"
          else
            TARGET_DATE="$(TZ=Asia/Shanghai date +%F)"
          fi

          if [[ ! "$TARGET_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid target date: $TARGET_DATE"
            exit 1
          fi

          YEAR_MONTH="${TARGET_DATE:0:7}"
          WORKER_BASE_URL="${WORKER_BASE_URL:-$DEFAULT_WORKER_BASE_URL}"
          TRIGGER_SECRET="${TRIGGER_SECRET:-$DEFAULT_TRIGGER_SECRET}"
          RAW_URL="https://raw.githubusercontent.com/${FRONTEND_OWNER}/${FRONTEND_REPO}/main/content/cn/project-opportunity/${YEAR_MONTH}/${TARGET_DATE}.md"
          TRIGGER_URL="${WORKER_BASE_URL}/testTriggerScheduled?key=${TRIGGER_SECRET}&mode=project-opportunity&date=${TARGET_DATE}&sync=1"

          echo "target_date=$TARGET_DATE" >> "$GITHUB_OUTPUT"
          echo "raw_url=$RAW_URL" >> "$GITHUB_OUTPUT"
          echo "worker_base_url=$WORKER_BASE_URL" >> "$GITHUB_OUTPUT"
          echo "Triggering project-opportunity for ${TARGET_DATE}"
          body_file="$(mktemp)"
          trigger_status="$(curl -sS --max-time 900 -o "$body_file" -w "%{http_code}" "$TRIGGER_URL" || true)"
          trigger_response="$(cat "$body_file" 2>/dev/null || true)"
          rm -f "$body_file"

          if [[ -z "${trigger_status:-}" ]]; then
            trigger_status="000"
          fi

          {
            echo "trigger_status=$trigger_status"
            echo "trigger_response<<EOF"
            echo "${trigger_response:-<empty>}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Trigger status: ${trigger_status}"
          echo "Trigger response: ${trigger_response:-<empty>}"

          if [[ "$trigger_status" != "200" ]]; then
            echo "Worker trigger failed with status ${trigger_status}"
            exit 1
          fi

          published="false"
          for i in {1..20}; do
            if curl -fsSI "$RAW_URL" > /dev/null; then
              published="true"
              break
            fi
            sleep 15
          done

          echo "published=$published" >> "$GITHUB_OUTPUT"

          if [[ "$published" != "true" ]]; then
            echo "Project opportunity page was not published in time: $RAW_URL"
            exit 1
          fi

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Project Opportunity Schedule Result"
            echo ""
            echo "- Date: ${{ steps.trigger.outputs.target_date }}"
            echo "- Worker: ${{ steps.trigger.outputs.worker_base_url }}"
            echo "- Raw URL: ${{ steps.trigger.outputs.raw_url }}"
            echo "- Trigger HTTP Status: ${{ steps.trigger.outputs.trigger_status }}"
            echo "- Published: ${{ steps.trigger.outputs.published }}"
          } >> "$GITHUB_STEP_SUMMARY"
