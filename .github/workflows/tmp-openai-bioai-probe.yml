name: Temp OpenAI BioAI Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger worker
        id: trigger
        shell: bash
        env:
          TRIGGER_SECRET: ${{ secrets.TEST_TRIGGER_SECRET }}
        run: |
          set -euo pipefail
          SECRET="${TRIGGER_SECRET:-test-secret-key-change-me}"
          URL="https://cloudflare-bioai-daily.sabrinamisan090.workers.dev/testTriggerScheduled?key=${SECRET}&date=2026-03-19&sync=1"
          BODY_FILE="$(mktemp)"
          STATUS="$(curl -sS --max-time 1800 -o "$BODY_FILE" -w "%{http_code}" "$URL" || true)"
          echo "HTTP ${STATUS}"
          cat "$BODY_FILE" || true
          echo
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          {
            echo "response<<EOF"
            cat "$BODY_FILE" || true
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          test "$STATUS" = "200"

      - name: Wait for raw file
        shell: bash
        run: |
          set -euo pipefail
          RAW="https://raw.githubusercontent.com/dongyu19920904/BioAI-Daily-Web/main/daily/2026-03-19.md"
          rm -f daily.md
          for i in {1..30}; do
            if curl -fsS "$RAW" -o daily.md; then
              echo "got raw on attempt $i"
              break
            fi
            sleep 20
          done
          test -f daily.md
          head -n 80 daily.md
          echo "IMG_COUNT=$(grep -o '!\[' daily.md | wc -l | tr -d ' ')"
          echo "H2_COUNT=$(grep -c '^## ' daily.md || true)"
          echo "H3_COUNT=$(grep -c '^### ' daily.md || true)"
          if grep -qiE "I can't|I cannot|Would you like help|Set up an API integration|无法完成|请提供|素材不足" daily.md; then
            echo 'BAD_PATTERN=1'
            exit 1
          fi